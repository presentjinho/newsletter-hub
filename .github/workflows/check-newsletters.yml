name: Check newsletter links

on:
  workflow_dispatch:
  schedule:
    - cron: '17 2 * * *'

permissions:
  contents: write

concurrency:
  group: newsletter-link-status
  cancel-in-progress: false

jobs:
  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: node scripts/check-newsletters.mjs
      - name: Commit status snapshot
        run: |
          git config user.name "newsletter-directory-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/link-status.json
          if [ -f data/link-status.json ]; then git add data/link-status.json; fi
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "chore: refresh newsletter link status"
          git pull --rebase origin main
          git push origin HEAD:main
