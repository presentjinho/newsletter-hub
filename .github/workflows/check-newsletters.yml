name: Check newsletter links

on:
  workflow_dispatch:
  schedule:
    - cron: '17 2 * * *'

permissions:
  contents: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/check-newsletters.mjs
      - name: Commit status snapshot
        run: |
          git config user.name "newsletter-directory-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/link-status.json data/link-status.json
          git diff --cached --quiet || git commit -m "chore: refresh newsletter link status"
          git push
